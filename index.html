<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pong</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #app {
        width: 100vw;
        height: 100vh;
      }
      :root {
        /* Vertical space reserved outside the playfield for HUD/help.
           Must match HUD_PX in src/main.js. */
        --hud-zone: 64px;
      }
      #hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--hud-zone);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 64px;
        color: #fff;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-size: 28px;
        letter-spacing: 6px;
        pointer-events: none;
      }
      #mode {
        font-size: 14px;
        letter-spacing: 3px;
        color: #888;
      }
      #help {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: var(--hud-zone);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #888;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-size: 12px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <span id="score-left">0</span>
      <span id="mode">1P vs AI</span>
      <span id="score-right">0</span>
    </div>
    <div id="help">
      W/S = left paddle &nbsp;·&nbsp; ↑/↓ = right paddle &nbsp;·&nbsp; Space = serve &nbsp;·&nbsp; 1
      = vs AI &nbsp;·&nbsp; 2 = 2P
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
